        }

        .breadcrumb-item {
            font-family: 'Onest', sans-serif;

            color: #999;

        }

        .breadcrumb-item:hover {

        }

        .breadcrumb-item.active {
            color: #0096ff;
        }

        .breadcrumb-separator {
            width: 8px;
            height: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .breadcrumb-separator svg {
            width: 100%;
            height: 100%;
        }

        /* 标签区域 */
        .tag-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-bottom: 48px;
        }

        .tag-list {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tag-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            padding: 8px 12px;
            border-radius: 999px;
            font-family: 'Onest', sans-serif;
            font-weight: 400;
            font-size: 14px;
            color: #ffffff;
            text-transform: capitalize;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tag-item:hover {
            color: #0096ff;
        }

        .tag-item:hover .tag-dot {
            background-color: #0096ff;
        }

        .tag-item.active {
            color: #0096ff;
        }

        .tag-item.active .tag-dot {
            background-color: #0096ff;
        }

        .tag-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.6);
            transition: background-color 0.3s ease;
        }

        .tag-divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .tag-title {
            font-family: 'Onest', sans-serif;
            font-weight: 600;
            font-size: 20px;
            color: #ffffff;
            text-transform: capitalize;
        }

        /* 新闻卡片网格 */
        .news-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 48px 24px;
            justify-content: flex-start;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* News Card Styles */
        .news-card {
            width: 282px;
            height: 317px;
            background: #1c1d1e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            background: #2d2f32;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .news-card:hover .news-card-title {
            color: #0096ff;
            white-space: normal;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            height: 64px;
        }

        .news-card:hover .news-card-tags {
            display: flex;
        }

        .news-card:hover .news-card-image {
            height: 120px;
            background: #1c1d1e;
        }

        .news-card-image {
            width: 100%;
            height: 203px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            transition: height 0.3s ease;
        }

        .news-card-image img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .news-card-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
            overflow: hidden;
        }

        .news-card-title {
            font-family: 'Onest', sans-serif;
            font-weight: 600;
            font-size: 20px;
            color: #FFFFFF;
            line-height: 32px;
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color 0.3s ease;
        }

        .news-card-tags {
            display: none;
            flex-wrap: nowrap;
            gap: 8px;
            overflow: visible;
            position: relative;
            margin-left: -16px;
            margin-right: -16px;
            padding-left: 16px;
            padding-right: 16px;
        }

        .news-card-tags-inner {
            display: flex;
            gap: 8px;
            animation: scrollTags 8s linear infinite;
        }

        .news-card:hover .news-card-tags-inner {
            animation-play-state: running;
        }

        @keyframes scrollTags {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .news-card-tag {
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 8px;
            border-radius: 999px;
            font-family: 'Onest', sans-serif;
            font-weight: 400;
            font-size: 14px;
            color: #999;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .news-card-divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .news-card-date {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Onest', sans-serif;
            font-weight: 400;
            font-size: 14px;
            color: #999;
            text-transform: capitalize;
        }

        .news-card-date-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .page-container {
                padding: 100px 60px 60px;

                justify-content: center;
            }
        }

            .page-container {

            .news-grid {
                gap: 24px;
                justify-content: center;
            }

            .news-card {
                width: 100%;
                max-width: 282px;

        // 获取 URL 参数
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 选择标签
        function selectTag(tagName) {
            // 更新 URL
            const url = new URL(window.location);
            url.searchParams.set('tag', tagName);
            window.history.pushState({}, '', url);

            // 更新页面
            updatePage(tagName);
        }

        // 更新页面
        function updatePage(tagName) {
            // 更新标题
            document.getElementById('tag-title').textContent = tagName;
            document.getElementById('breadcrumb-tag').textContent = tagName;

            // 更新标签选中状态
            document.querySelectorAll('.tag-item').forEach(item => {
                if (item.dataset.tag === tagName) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            // 筛选新闻
            const filteredNews = newsData.filter(news => 
                news.tags.some(tag => tag.toLowerCase() === tagName.toLowerCase())
            );

            // 渲染新闻卡片
            renderNewsCards(filteredNews);
        }

        // 渲染新闻卡片
        function renderNewsCards(newsList) {
            const grid = document.getElementById('news-grid');
            
            if (newsList.length === 0) {
                grid.innerHTML = '<div style="width: 100%; text-align: center; color: #999; padding: 60px 0;">No news found for this tag</div>';
                return;
            }

            grid.innerHTML = newsList.map(news => `
                <div class="news-card" onclick="window.location.href='news-detail.html?id=${news.id}&image=${encodeURIComponent(news.image)}'">
                    <div class="news-card-image">
                        <img src="${news.image}" alt="${news.title}">
                    </div>
                    <div class="news-card-content">
                        <div class="news-card-title">${news.title}</div>
                        <div class="news-card-tags"><div class="news-card-tags-inner">
                            ${news.tags.map(tag => `<span class="news-card-tag">${tag}</span>`).join('')}
                            ${news.tags.map(tag => `<span class="news-card-tag">${tag}</span>`).join('')}
                        </div></div>
                        <div class="news-card-divider"></div>
                        <div class="news-card-date">
                            <svg class="news-card-date-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M8 2V5M16 2V5M3.5 9.09H20.5M21 8.5V17C21 20 19.5 22 16 22H8C4.5 22 3 20 3 17V8.5C3 5.5 4.5 3.5 8 3.5H16C19.5 3.5 21 5.5 21 8.5Z" stroke="currentColor" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M15.6947 13.7H15.7037M15.6947 16.7H15.7037M11.9955 13.7H12.0045M11.9955 16.7H12.0045M8.29431 13.7H8.30329M8.29431 16.7H8.30329" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span>${news.date}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            const tagFromUrl = getUrlParam('tag');
            const initialTag = tagFromUrl || 'Formula1';
            updatePage(initialTag);
        });
    </script>
